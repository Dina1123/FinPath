services:
  - type: web
    name: finpath-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finpath-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: finpath-db
    databaseName: finpath
    plan: free
